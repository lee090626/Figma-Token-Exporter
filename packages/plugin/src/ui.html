<!doctype html>
<html>
<body style="font: 13px Inter, sans-serif; padding: 16px; color: var(--figma-color-text); background: var(--figma-color-bg)">
  <h2 style="font-size: 16px; margin: 0 0 8px">Export design tokens</h2>
  <p id="status">현재 파일의 Variables를 읽고 있습니다.</p>
  <div id="downloads" style="display: grid; gap: 8px"></div>
  <script>
    let files;
    onmessage = ({ data }) => {
      const message = data.pluginMessage;
      if (message.type === "error") document.getElementById("status").textContent = `오류: ${message.message}`;
      if (message.type === "exports") {
        files = message.files;
        document.getElementById("status").textContent = `${message.count}개 토큰을 읽었습니다.`;
        document.getElementById("downloads").replaceChildren(...Object.keys(files).map((filename) => {
          const button = document.createElement("button");
          button.textContent = `${filename} 다운로드`;
          button.onclick = () => download(filename);
          return button;
        }));
      }
    };
    function download(filename) {
      const link = document.createElement("a");
      link.href = URL.createObjectURL(new Blob([files[filename]], { type: "text/plain" }));
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }
  </script>
</body>
</html>
