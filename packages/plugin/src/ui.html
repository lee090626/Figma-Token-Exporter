<!doctype html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 16px; font: 12px/1.45 Inter, sans-serif; color: var(--figma-color-text); background: var(--figma-color-bg); }
    p { margin: 0; }
    #result { display: grid; gap: 16px; }
    .intro { margin-bottom: 20px; }
    h1 { margin: 0 0 4px; font-size: 16px; line-height: 1.3; }
    .section-title { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; }
    .muted { color: var(--figma-color-text-secondary); }
    .summary { padding-bottom: 14px; border-bottom: 1px solid var(--figma-color-border); }
    .summary-count { font-size: 16px; font-weight: 600; }
    .counts { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 0; padding: 0; list-style: none; }
    .counts li { padding: 2px 6px; border-radius: 3px; color: var(--figma-color-text-secondary); background: var(--figma-color-bg-secondary); }
    .actions { display: grid; gap: 8px; }
    button { width: 100%; min-height: 32px; padding: 6px 12px; border: 1px solid var(--figma-color-border); border-radius: 5px; color: var(--figma-color-text); background: var(--figma-color-bg); font: inherit; font-weight: 500; text-align: center; cursor: pointer; }
    button:hover { background: var(--figma-color-bg-hover); }
    button.primary { border-color: var(--figma-color-bg-brand); color: var(--figma-color-text-onbrand); background: var(--figma-color-bg-brand); font-weight: 600; }
    button.primary:hover { background: var(--figma-color-bg-brand-hover); }
    button:focus-visible, summary:focus-visible { outline: 2px solid var(--figma-color-border-selected); outline-offset: 2px; }
    .component { padding: 12px; border-radius: 6px; background: var(--figma-color-bg-secondary); }
    .component p { margin-bottom: 8px; }
    .cli { padding: 12px; border-radius: 5px; background: var(--figma-color-bg-secondary); }
    .cli p + p { margin-top: 8px; }
    pre { margin: 10px 0 0; padding: 7px 8px; border-radius: 3px; background: var(--figma-color-bg); font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
    details { padding-top: 2px; }
    summary { cursor: pointer; font-weight: 600; }
    .individual-actions { display: grid; gap: 6px; margin-top: 10px; }
    #warning { margin-top: 10px; color: var(--figma-color-text-danger); }
    #warning[hidden] { display: none; }
  </style>
</head>
<body>
  <header class="intro">
    <h1>Design token export</h1>
    <p class="muted">Figma Variables를 프로젝트에서 쓸 수 있는 파일로 내보냅니다.</p>
  </header>
  <p id="status">현재 파일의 Variables를 읽고 있습니다.</p>

  <main id="result" hidden>
    <section class="summary" aria-labelledby="summary-title">
      <strong id="summary-title" class="section-title">Export 결과</strong>
      <p id="tokenCount" class="summary-count"></p>
      <ul id="counts" class="counts"></ul>
      <div id="warning" hidden>
        <p id="skippedStatus"></p>
        <ul id="skipped" style="margin: 0; padding-left: 18px"></ul>
      </div>
    </section>

    <section aria-labelledby="actions-title">
      <strong id="actions-title" class="section-title">다운로드</strong>
      <div class="actions">
        <button id="downloadAll" class="primary" type="button">전체 파일 다운로드</button>
        <button id="downloadTokens" type="button">tokens.json 다운로드</button>
      </div>
    </section>

    <section id="componentManifest" class="component" hidden aria-labelledby="component-title">
      <strong id="component-title" class="section-title">선택 컴포넌트</strong>
      <p id="componentManifestStatus" class="muted"></p>
      <button id="downloadComponentManifest" type="button">component-manifest.json 다운로드</button>
    </section>

    <section id="frameManifest" class="component" hidden aria-labelledby="frame-title">
      <strong id="frame-title" class="section-title">선택한 화면의 토큰 사용처</strong>
      <p id="frameManifestStatus" class="muted"></p>
      <button id="downloadFrameManifest" type="button">token-usage.json 다운로드</button>
    </section>

    <section class="cli" aria-labelledby="cli-title">
      <strong id="cli-title" class="section-title">CLI로 프로젝트에 적용</strong>
      <p>tokens.json을 프로젝트 루트에 저장한 뒤 실행하세요.</p>
      <pre><code>figma-token</code></pre>
      <p class="muted">CLI는 파일 적용과 최신 상태 검사를 위한 선택 도구입니다.</p>
    </section>

    <details>
      <summary>개별 형식 다운로드</summary>
      <div id="individualDownloads" class="individual-actions"></div>
    </details>
  </main>

  <script>
    let files;
    let componentManifest;
    let frameManifest;
    let resizeFrame;
    const tokenTypes = ["color", "spacing", "radius", "borderWidth", "size", "fontSize", "opacity"];
    const textEncoder = new TextEncoder();
    const crcTable = Uint32Array.from({ length: 256 }, (_, index) => {
      let value = index;
      for (let bit = 0; bit < 8; bit++) value = value & 1 ? 0xedb88320 ^ (value >>> 1) : value >>> 1;
      return value >>> 0;
    });

    onmessage = ({ data }) => {
      const message = data.pluginMessage;
      if (message.type === "error") {
        files = undefined;
        document.getElementById("result").hidden = true;
        document.getElementById("status").hidden = false;
        document.getElementById("status").textContent = `오류: ${message.message}`;
        return;
      }
      if (message.type === "component-manifest-unavailable") return;
      if (message.type === "component-manifest-error") {
        document.getElementById("componentManifest").hidden = false;
        document.getElementById("componentManifestStatus").textContent = `컴포넌트를 분석하지 못했습니다: ${message.message}`;
        document.getElementById("downloadComponentManifest").disabled = true;
        return;
      }
      if (message.type === "component-manifest") {
        componentManifest = message.file;
        document.getElementById("componentManifest").hidden = false;
        document.getElementById("componentManifestStatus").textContent = message.variantCount
          ? `${message.variantCount}개 variant와 ${message.variableCount}개 Variable binding을 찾았습니다.`
          : `선택한 컴포넌트에서 ${message.variableCount}개 Variable binding을 찾았습니다.`;
        document.getElementById("downloadComponentManifest").onclick = () => triggerDownload(new Blob([componentManifest], { type: "application/json" }), "component-manifest.json");
        return;
      }
      if (message.type === "frame-manifest-unavailable") return;
      if (message.type === "frame-manifest-error") {
        document.getElementById("frameManifest").hidden = false;
        document.getElementById("frameManifestStatus").textContent = `화면을 분석하지 못했습니다: ${message.message}`;
        document.getElementById("downloadFrameManifest").disabled = true;
        return;
      }
      if (message.type === "frame-manifest") {
        frameManifest = message.file;
        document.getElementById("frameManifest").hidden = false;
        document.getElementById("frameManifestStatus").textContent = `${message.tokenCount}개 Token이 ${message.usageCount}개 레이어에서 사용됩니다.`;
        document.getElementById("downloadFrameManifest").onclick = () => triggerDownload(new Blob([frameManifest], { type: "application/json" }), "token-usage.json");
        return;
      }
      if (message.type !== "exports") return;

      files = message.files;
      document.getElementById("status").hidden = true;
      document.getElementById("result").hidden = false;
      document.getElementById("tokenCount").textContent = `${message.count}개 토큰을 읽었습니다.`;
      document.getElementById("counts").replaceChildren(...tokenTypes.filter((type) => message.typeCounts?.[type]).map((type) => {
        const item = document.createElement("li");
        item.textContent = `${type} ${message.typeCounts[type]}개`;
        return item;
      }));
      const skippedVariables = message.skippedVariables || [];
      const warning = document.getElementById("warning");
      warning.hidden = !skippedVariables.length;
      document.getElementById("skippedStatus").textContent = "다음 변수는 이름 규칙과 맞지 않아 제외되었습니다.";
      document.getElementById("skipped").replaceChildren(...skippedVariables.map((name) => {
        const item = document.createElement("li");
        item.textContent = name;
        return item;
      }));
      document.getElementById("downloadAll").onclick = () => downloadAll();
      document.getElementById("downloadTokens").onclick = () => download("tokens.json");
      document.getElementById("individualDownloads").replaceChildren(...Object.keys(files).filter((filename) => filename !== "tokens.json").map((filename) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = `${filename} 다운로드`;
        button.onclick = () => download(filename);
        return button;
      }));
    };

    function download(filename) {
      triggerDownload(new Blob([files[filename]], { type: "text/plain" }), filename);
    }

    function resizeToContent() {
      cancelAnimationFrame(resizeFrame);
      resizeFrame = requestAnimationFrame(() => parent.postMessage({ pluginMessage: { type: "resize", height: document.body.scrollHeight } }, "*"));
    }

    function downloadAll() {
      triggerDownload(new Blob([createZip(Object.entries(files))], { type: "application/zip" }), "figma-token-export.zip");
    }

    function triggerDownload(blob, filename) {
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.download = filename;
      link.click();
      setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function createZip(entries) {
      const localFiles = [];
      const centralDirectory = [];
      let offset = 0;
      for (const [filename, content] of entries) {
        const name = textEncoder.encode(filename);
        const data = textEncoder.encode(content);
        const crc = crc32(data);
        const local = joinBytes([u32(0x04034b50), u16(20), u16(0), u16(0), u16(0), u16(0), u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0), name, data]);
        localFiles.push(local);
        centralDirectory.push(joinBytes([u32(0x02014b50), u16(20), u16(20), u16(0), u16(0), u16(0), u16(0), u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0), u16(0), u16(0), u16(0), u32(0), u32(offset), name]));
        offset += local.length;
      }
      const central = joinBytes(centralDirectory);
      return joinBytes([...localFiles, central, u32(0x06054b50), u16(0), u16(0), u16(entries.length), u16(entries.length), u32(central.length), u32(offset), u16(0)]);
    }

    function crc32(data) {
      let crc = 0xffffffff;
      for (const byte of data) crc = crcTable[(crc ^ byte) & 0xff] ^ (crc >>> 8);
      return (crc ^ 0xffffffff) >>> 0;
    }

    function u16(value) {
      return new Uint8Array([value & 0xff, value >>> 8 & 0xff]);
    }

    function u32(value) {
      return new Uint8Array([value & 0xff, value >>> 8 & 0xff, value >>> 16 & 0xff, value >>> 24 & 0xff]);
    }

    function joinBytes(parts) {
      const result = new Uint8Array(parts.reduce((length, part) => length + part.length, 0));
      let offset = 0;
      for (const part of parts) {
        result.set(part, offset);
        offset += part.length;
      }
      return result;
    }

    new MutationObserver(resizeToContent).observe(document.body, { attributes: true, childList: true, characterData: true, subtree: true });
    parent.postMessage({ pluginMessage: { type: "ui-ready" } }, "*");
    resizeToContent();
  </script>
</body>
</html>
